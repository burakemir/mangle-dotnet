name: build + pack

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Build the mangle-ffi cdylib for every RID. Each entry uploads its
  # native lib as an artifact named runtime-<rid>.
  #
  # macOS/Windows build natively on their own runner. The two Linux
  # arches build from a single x86_64 runner via cargo-zigbuild: zig
  # cross-links and lets us pin glibc to 2.17 (manylinux2014 baseline)
  # so the .so runs on older distros instead of requiring whatever
  # glibc the runner happens to ship. macOS sets a deployment-target
  # floor for the same reason.
  natives:
    name: native (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # rust_target = triple passed to the build tool (zigbuild
          # accepts a .<glibc> suffix); out_dir = cargo's output subdir
          # (the plain triple, no glibc suffix).
          - rid: linux-x64
            os: ubuntu-latest
            tool: zigbuild
            rust_target: x86_64-unknown-linux-gnu.2.17
            out_dir: x86_64-unknown-linux-gnu
            lib: libmangle_ffi.so
          - rid: linux-arm64
            os: ubuntu-latest
            tool: zigbuild
            rust_target: aarch64-unknown-linux-gnu.2.17
            out_dir: aarch64-unknown-linux-gnu
            lib: libmangle_ffi.so
          - rid: osx-arm64
            os: macos-14
            tool: cargo
            rust_target: aarch64-apple-darwin
            out_dir: aarch64-apple-darwin
            lib: libmangle_ffi.dylib
          # Cross-built from the Apple-Silicon runner: the macOS SDK +
          # clang target x86_64 out of the box, so we avoid the scarce
          # (and being-retired) macos-13 Intel runners entirely.
          - rid: osx-x64
            os: macos-14
            tool: cargo
            rust_target: x86_64-apple-darwin
            out_dir: x86_64-apple-darwin
            lib: libmangle_ffi.dylib
          - rid: win-x64
            os: windows-latest
            tool: cargo
            rust_target: x86_64-pc-windows-msvc
            out_dir: x86_64-pc-windows-msvc
            lib: mangle_ffi.dll
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - name: Update Rust + add target
        run: |
          rustup update stable && rustup default stable
          rustup target add ${{ matrix.out_dir }}
      - name: Install zig + cargo-zigbuild
        if: matrix.tool == 'zigbuild'
        run: |
          python3 -m pip install --user ziglang
          cargo install --locked cargo-zigbuild
      - name: Build (cargo, native)
        if: matrix.tool == 'cargo'
        shell: bash
        env:
          # macOS compatibility floor (ignored on Windows).
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: |
          cargo build --release -p mangle-ffi \
            --target ${{ matrix.rust_target }} \
            --manifest-path third-party/mangle-rs/crates/mangle-ffi/Cargo.toml
      - name: Build (zigbuild, pinned glibc 2.17)
        if: matrix.tool == 'zigbuild'
        shell: bash
        run: |
          cargo zigbuild --release -p mangle-ffi \
            --target ${{ matrix.rust_target }} \
            --manifest-path third-party/mangle-rs/crates/mangle-ffi/Cargo.toml
      - name: Stage native lib
        shell: bash
        run: |
          mkdir -p staging/${{ matrix.rid }}
          cp "third-party/mangle-rs/target/${{ matrix.out_dir }}/release/${{ matrix.lib }}" \
             "staging/${{ matrix.rid }}/${{ matrix.lib }}"
      - uses: actions/upload-artifact@v5
        with:
          name: runtime-${{ matrix.rid }}
          path: staging/${{ matrix.rid }}/

  # Regenerate the C# P/Invoke from the FFI and fail if it drifted.
  bindings-fresh:
    name: bindings up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive
      - run: rustup update stable && rustup default stable
      # No workspace Cargo.toml at the repo root, so point cargo at the
      # bindings crate's manifest directly. Its build.rs derives the
      # repo root from CARGO_MANIFEST_DIR, so the codegen output path is
      # correct regardless of cwd.
      - run: cargo build --manifest-path crates/mangle-dotnet-bindings/Cargo.toml
      - name: NativeMethods.g.cs is up to date
        run: git diff --exit-code src/Mangle/NativeMethods.g.cs

  # Collect every RID's native into runtimes/, then build + pack +
  # (on a v* tag) push to nuget.org.
  pack:
    name: dotnet pack
    needs: [natives, bindings-fresh]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - name: Download all native artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
      - name: Arrange runtimes/<rid>/native/
        run: |
          for d in artifacts/runtime-*; do
            rid="${d#artifacts/runtime-}"
            mkdir -p "src/Mangle/runtimes/$rid/native"
            cp "$d"/* "src/Mangle/runtimes/$rid/native/"
          done
          find src/Mangle/runtimes -type f
      # On a v* tag the tag is the single source of truth for the
      # package version (strip the leading "v"); a SemVer suffix like
      # -rc.1 makes it a nuget.org prerelease. On branch/PR builds we
      # fall back to the csproj <Version> so pack still works.
      - name: Pack
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            version="${GITHUB_REF_NAME#v}"
            echo "Packing tagged version: $version"
            dotnet pack src/Mangle/Mangle.csproj -c Release -o nupkg -p:Version="$version"
          else
            dotnet pack src/Mangle/Mangle.csproj -c Release -o nupkg
          fi
      - uses: actions/upload-artifact@v5
        with:
          name: nupkg
          path: nupkg/*.nupkg

  # Publish to nuget.org via trusted publishing (OIDC) — no long-lived
  # API key. Gated to v* tags and bound to the "production" GitHub
  # Environment. The environment is where NUGET_USER lives (env-scoped
  # vars only resolve in a job that declares `environment:`), and it's
  # where any deployment protection rules attach. Keeping publish in
  # its own job means those rules gate only the publish — not the
  # build/pack on branches and PRs.
  #
  # NOTE: verify the NuGet/login action ref (@v1) and its `user` input
  # / `NUGET_API_KEY` output against current nuget.org
  # trusted-publishing docs — newer than the assistant's knowledge
  # cutoff. id-token:write and the OIDC mechanism itself are stable.
  publish:
    name: publish to nuget.org
    needs: pack
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - name: Download nupkg
        uses: actions/download-artifact@v5
        with:
          name: nupkg
          path: nupkg
      - name: Trusted-publishing login
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}
      - name: Push
        run: |
          dotnet nuget push "nupkg/*.nupkg" \
            --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
